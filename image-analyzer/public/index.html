<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Analyzer — Truth Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px;
      max-width: 780px;
      margin: 0 auto 24px;
    }
    .upload-area {
      border: 2px dashed #3a4560;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .upload-area:hover { border-color: #6366f1; }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-label {
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .upload-label strong { color: #a5b4fc; }
    #preview {
      margin-top: 20px;
      display: none;
      text-align: center;
    }
    #preview img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      border: 1px solid #2d3748;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #3a4560; cursor: not-allowed; }
    #status {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }

    /* Results */
    .results { display: none; }
    .badges {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      padding: 14px 20px;
      border-radius: 10px;
      min-width: 200px;
      flex: 1;
    }
    .badge-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }
    .badge-value {
      font-size: 1.2rem;
      font-weight: 800;
    }
    .badge-confidence {
      font-size: 0.8rem;
      opacity: 0.75;
    }
    .badge-real    { background: #0f2d1f; border: 1px solid #1d9e75; color: #4ade80; }
    .badge-ai      { background: #2d0f0f; border: 1px solid #e53e3e; color: #fc8181; }
    .badge-VERIFIED       { background: #0f2d1f; border: 1px solid #1d9e75; color: #4ade80; }
    .badge-PARTIALLY_TRUE { background: #2d2200; border: 1px solid #d69e2e; color: #fbbf24; }
    .badge-INCONCLUSIVE   { background: #1a1f2e; border: 1px solid #4a5568; color: #a0aec0; }
    .badge-MISLEADING     { background: #2d1a00; border: 1px solid #dd6b20; color: #fb923c; }
    .badge-FALSE          { background: #2d0f0f; border: 1px solid #e53e3e; color: #fc8181; }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }
    .reasoning-block {
      background: #141822;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.92rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 16px;
    }
    .json-block {
      background: #0d1017;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Menlo', 'Courier New', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 16px;
    }
    .divider {
      border: none;
      border-top: 1px solid #2d3748;
      margin: 20px 0;
    }
    .error-block {
      background: #2d0f0f;
      border: 1px solid #e53e3e;
      color: #fc8181;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div style="max-width:780px;margin:0 auto;">
  <h1>Image Analyzer</h1>
  <p class="subtitle">AI Detection &amp; Content Fact-Check — Truth Engine · Port 3003</p>

  <div class="card">
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif" />
      <div class="upload-label">
        <strong>Click to upload</strong> or drag &amp; drop<br>
        <span style="font-size:0.8rem;">JPG, PNG, WEBP, GIF — max 20 MB</span>
      </div>
    </div>

    <div id="preview">
      <img id="previewImg" src="" alt="Preview" />
    </div>

    <div style="text-align:center;">
      <button class="btn" id="analyzeBtn" disabled>Analyze Image</button>
      <div id="status"></div>
    </div>
  </div>

  <div class="card results" id="results">
    <div class="badges" id="badges"></div>

    <div class="section-title">AI Detection Reasoning</div>
    <div class="reasoning-block" id="aiReasoning"></div>

    <div class="section-title">Content Fact-Check Summary</div>
    <div class="reasoning-block" id="contentSummary"></div>

    <hr class="divider" />
    <div class="section-title">Raw JSON Response</div>
    <div class="json-block" id="jsonBlock"></div>
  </div>

  <div class="card" id="errorCard" style="display:none;">
    <div class="error-block" id="errorBlock"></div>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const errorCard = document.getElementById('errorCard');
  const errorBlock = document.getElementById('errorBlock');

  const VERDICT_LABELS = {
    VERIFIED: 'Verified',
    PARTIALLY_TRUE: 'Partially True',
    INCONCLUSIVE: 'Inconclusive',
    MISLEADING: 'Misleading',
    FALSE: 'False'
  };

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    preview.style.display = 'block';
    analyzeBtn.disabled = false;
    results.style.display = 'none';
    errorCard.style.display = 'none';
    status.textContent = '';
  });

  analyzeBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    analyzeBtn.disabled = true;
    status.textContent = 'Analyzing image…';
    results.style.display = 'none';
    errorCard.style.display = 'none';

    const formData = new FormData();
    formData.append('image', file);

    try {
      const resp = await fetch('/api/analyze-image', { method: 'POST', body: formData });
      const data = await resp.json();

      if (!resp.ok || data.error) {
        throw new Error(data.error || `HTTP ${resp.status}`);
      }

      renderResults(data);
    } catch (err) {
      errorCard.style.display = 'block';
      errorBlock.textContent = 'Error: ' + err.message;
      status.textContent = '';
    } finally {
      analyzeBtn.disabled = false;
    }
  });

  function renderResults(data) {
    // Badges
    const badgesEl = document.getElementById('badges');
    const aiClass = data.is_ai_generated ? 'badge-ai' : 'badge-real';
    const aiLabel = data.is_ai_generated ? 'AI Generated' : 'Real Photo';
    const verdictClass = 'badge-' + (data.content_verdict || 'INCONCLUSIVE');
    const verdictLabel = VERDICT_LABELS[data.content_verdict] || data.content_verdict;

    badgesEl.innerHTML = `
      <div class="badge ${aiClass}">
        <span class="badge-label">AI Detection</span>
        <span class="badge-value">${aiLabel}</span>
        <span class="badge-confidence">Confidence: ${data.ai_confidence ?? '—'}%</span>
      </div>
      <div class="badge ${verdictClass}">
        <span class="badge-label">Content Verdict</span>
        <span class="badge-value">${verdictLabel}</span>
        <span class="badge-confidence">Confidence: ${data.content_confidence ?? '—'}%</span>
      </div>
    `;

    document.getElementById('aiReasoning').textContent = data.ai_reasoning || '—';
    document.getElementById('contentSummary').textContent = data.content_summary || '—';
    document.getElementById('jsonBlock').textContent = JSON.stringify(data, null, 2);

    results.style.display = 'block';
    status.textContent = '';
  }
</script>
</body>
</html>
